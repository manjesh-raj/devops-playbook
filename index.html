<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The DevOps Playbook</title>
  <script>(function(){try{var t=localStorage.getItem("theme");if(t!=="light"&&t!=="dark")t="dark";document.documentElement.setAttribute("data-theme",t);if(localStorage.getItem("nbPlain")==="1")document.documentElement.classList.add("nb-plain");}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Permanent+Marker&family=Caveat:wght@600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=33" />
</head>
<body>
<main class="main" id="mainContent">

  <section id="shelf" class="section shelf-section" aria-label="The DevOps Playbook library">
    <div class="lib-inner">

      <header class="lib-header">
        <div>
          <h1 class="lib-title">The DevOps Playbook</h1>
          <p class="lib-subtitle">A shelf of hands-on notebooks. Pick a topic, open the book, and read at your own pace. Your progress is saved as you go.</p>
        </div>
        <button class="lib-theme" data-theme-toggle title="Toggle dark/light mode" aria-label="Toggle dark/light mode">
          <span data-theme-icon>🌙</span>
        </button>
      </header>

      <!-- Every card is rendered from the NB_LIBRARY data structure in script.js. -->
      <div id="libRoot"></div>

    </div>
  </section>

</main>
<script src="script.js?v=33"></script>
</body>
</html>
